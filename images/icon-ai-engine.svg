<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Main body gradient - brushed aluminum -->
    <linearGradient id="hubBody" x1="40" y1="40" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="35%" stop-color="#e2e8f0"/>
      <stop offset="70%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- Glass dome gradient -->
    <linearGradient id="glassDome" x1="70" y1="50" x2="130" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#bfdbfe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Glass reflection -->
    <linearGradient id="hubReflection" x1="80" y1="55" x2="100" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="hubShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a5f" flood-opacity="0.15"/>
    </filter>
    <!-- Core glow -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <!-- Neural glow -->
    <filter id="neuralGlow">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base platform -->
  <ellipse cx="100" cy="155" rx="55" ry="12" fill="#e2e8f0" opacity="0.6"/>

  <!-- Main hub body - cylinder -->
  <rect x="55" y="70" width="90" height="80" rx="10" fill="url(#hubBody)" filter="url(#hubShadow)"/>

  <!-- Brushed aluminum lines -->
  <line x1="60" y1="85" x2="140" y2="85" stroke="#cbd5e1" stroke-width="0.5" opacity="0.6"/>
  <line x1="60" y1="95" x2="140" y2="95" stroke="#cbd5e1" stroke-width="0.5" opacity="0.4"/>
  <line x1="60" y1="105" x2="140" y2="105" stroke="#cbd5e1" stroke-width="0.5" opacity="0.3"/>

  <!-- Glass dome top -->
  <ellipse cx="100" cy="72" rx="42" ry="30" fill="url(#glassDome)" stroke="#bfdbfe" stroke-width="0.8"/>

  <!-- Glass reflection on dome -->
  <ellipse cx="88" cy="60" rx="18" ry="10" fill="url(#hubReflection)"/>

  <!-- AI core eye -->
  <circle cx="100" cy="68" r="14" fill="url(#coreGlow)"/>
  <circle cx="100" cy="68" r="7" fill="#3b82f6"/>
  <circle cx="100" cy="68" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- Neural network lines -->
  <g filter="url(#neuralGlow)" opacity="0.6">
    <line x1="100" y1="68" x2="72" y2="52" stroke="#60a5fa" stroke-width="1"/>
    <line x1="100" y1="68" x2="128" y2="52" stroke="#60a5fa" stroke-width="1"/>
    <line x1="100" y1="68" x2="80" y2="80" stroke="#60a5fa" stroke-width="1"/>
    <line x1="100" y1="68" x2="120" y2="80" stroke="#60a5fa" stroke-width="1"/>
    <circle cx="72" cy="52" r="2.5" fill="#60a5fa"/>
    <circle cx="128" cy="52" r="2.5" fill="#60a5fa"/>
    <circle cx="80" cy="80" r="2.5" fill="#60a5fa"/>
    <circle cx="120" cy="80" r="2.5" fill="#60a5fa"/>
  </g>

  <!-- Status LED strip -->
  <rect x="70" y="138" width="60" height="3" rx="1.5" fill="#3b82f6" opacity="0.7"/>
  <rect x="80" y="138" width="40" height="3" rx="1.5" fill="#60a5fa" opacity="0.4"/>
</svg>
