<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="gl"><feGaussianBlur stdDeviation="1" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Pulse / sense waveform -->
  <polyline points="6,32 14,32 18,18 24,46 30,22 36,42 40,28 46,36 50,32 58,32"
    stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#gl)"/>
  <!-- Sensor dot endpoints -->
  <circle cx="6" cy="32" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="58" cy="32" r="2" fill="#3b82f6" opacity="0.5"/>
  <!-- Top sensor arc -->
  <path d="M24,10 Q32,6 40,10" stroke="#60a5fa" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M20,6 Q32,1 44,6" stroke="#60a5fa" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Bottom data ticks -->
  <line x1="18" y1="54" x2="18" y2="58" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <line x1="26" y1="54" x2="26" y2="60" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="54" x2="34" y2="57" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="54" x2="42" y2="60" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
</svg>
