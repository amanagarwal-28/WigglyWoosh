<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a5f" flood-opacity="0.12"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="1.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#g)" filter="url(#s)"/>
  <!-- Running figure motion -->
  <circle cx="24" cy="14" r="3" fill="#3b82f6" opacity="0.8"/>
  <line x1="24" y1="17" x2="24" y2="27" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" filter="url(#gl)"/>
  <line x1="24" y1="27" x2="18" y2="35" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="27" x2="30" y2="35" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="17" y2="17" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="31" y2="25" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Speed lines -->
  <line x1="12" y1="20" x2="15" y2="20" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="11" y1="24" x2="14" y2="24" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
</svg>
