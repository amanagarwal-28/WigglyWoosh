<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a5f" flood-opacity="0.12"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="1.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#g)" filter="url(#s)"/>
  <!-- Puzzle piece / universal adapter shape -->
  <!-- Main circle (hub center) -->
  <circle cx="24" cy="24" r="5" fill="none" stroke="#3b82f6" stroke-width="1.5" filter="url(#gl)"/>
  <circle cx="24" cy="24" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <!-- Connector arms radiating out -->
  <line x1="24" y1="19" x2="24" y2="14" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="29" x2="24" y2="34" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="19" y1="24" x2="14" y2="24" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="29" y1="24" x2="34" y2="24" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <!-- End nodes (different devices) -->
  <rect x="21.5" y="12" width="5" height="3.5" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.7"/>
  <circle cx="24" cy="35.5" r="2.5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.7"/>
  <path d="M12 22 L12 26 L15 26 L15 22 Z" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.7" rx="0.5"/>
  <path d="M33 22.5 L36 22.5 L36 25.5 L33 25.5 Z" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.7" rx="0.5"/>
</svg>
