<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e3a5f" flood-opacity="0.12"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="1.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <circle cx="24" cy="24" r="18" fill="url(#g)" filter="url(#s)"/>
  <!-- Clipboard -->
  <rect x="14" y="14" width="20" height="24" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5" filter="url(#gl)"/>
  <rect x="20" y="11" width="8" height="6" rx="2" fill="#e2e8f0" stroke="#3b82f6" stroke-width="1"/>
  <!-- Lines on clipboard -->
  <line x1="18" y1="22" x2="30" y2="22" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="26" x2="28" y2="26" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="30" x2="26" y2="30" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <!-- Checkmark -->
  <polyline points="19,33 22,36 29,29" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
