<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none">
  <defs>
    <linearGradient id="g" x1="2" y1="4" x2="18" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="0.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Rocket body -->
  <path d="M10,2 Q14,6 14,12 L10,15 L6,12 Q6,6 10,2 Z" fill="url(#g)" stroke="#3b82f6" stroke-width="0.8" filter="url(#gl)"/>
