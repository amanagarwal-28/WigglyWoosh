<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="gl"><feGaussianBlur stdDeviation="1" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Outer dial arc -->
  <path d="M16,48 A22,22 0 1,1 48,48" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#gl)"/>
  <!-- Tick marks -->
  <line x1="32" y1="8" x2="32" y2="13" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="48" y1="16" x2="44.5" y2="19.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="16" x2="19.5" y2="19.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="54" y1="32" x2="49" y2="32" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="10" y1="32" x2="15" y2="32" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Needle pointing to adjusted position -->
  <line x1="32" y1="32" x2="44" y2="20" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" filter="url(#gl)"/>
  <circle cx="32" cy="32" r="3.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="32" cy="32" r="1.5" fill="#ffffff" opacity="0.8"/>
  <!-- Bottom fill indicator -->
  <rect x="20" y="52" width="24" height="4" rx="2" fill="#1e293b" opacity="0.3"/>
  <rect x="20" y="52" width="16" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
</svg>
