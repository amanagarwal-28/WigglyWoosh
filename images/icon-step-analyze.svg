<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="gl"><feGaussianBlur stdDeviation="1" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Central node -->
  <circle cx="32" cy="32" r="6" fill="none" stroke="#3b82f6" stroke-width="1.5" filter="url(#gl)"/>
  <circle cx="32" cy="32" r="2" fill="#3b82f6" opacity="0.6"/>
  <!-- Neural branches -->
  <line x1="32" y1="26" x2="32" y2="12" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="32" y2="52" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="32" x2="12" y2="32" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="32" x2="52" y2="32" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Diagonal branches -->
  <line x1="27.8" y1="27.8" x2="18" y2="18" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="36.2" y1="27.8" x2="46" y2="18" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="27.8" y1="36.2" x2="18" y2="46" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="36.2" y1="36.2" x2="46" y2="46" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Outer endpoint nodes -->
  <circle cx="32" cy="12" r="2.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="32" cy="52" r="2.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="12" cy="32" r="2.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="52" cy="32" r="2.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="18" cy="18" r="1.8" fill="#60a5fa" opacity="0.3"/>
  <circle cx="46" cy="18" r="1.8" fill="#60a5fa" opacity="0.3"/>
  <circle cx="18" cy="46" r="1.8" fill="#60a5fa" opacity="0.3"/>
  <circle cx="46" cy="46" r="1.8" fill="#60a5fa" opacity="0.3"/>
</svg>
