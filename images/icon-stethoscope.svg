<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="sBody" x1="50" y1="30" x2="150" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="40%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="sGlass" x1="70" y1="40" x2="130" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="sShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a5f" flood-opacity="0.15"/>
    </filter>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Stethoscope chest piece -->
  <circle cx="100" cy="130" r="28" fill="url(#sBody)" filter="url(#sShadow)" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="100" cy="130" r="18" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="100" cy="130" r="8" fill="#3b82f6" opacity="0.4"/>
  <!-- Glass highlight on chest piece -->
  <ellipse cx="92" cy="124" rx="8" ry="5" fill="url(#sGlass)"/>
  <!-- Tubing -->
  <path d="M100,102 L100,70 Q100,50 80,50 L70,50 Q55,50 55,65 L55,80" stroke="#94a3b8" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#sGlow)"/>
  <path d="M100,102 L100,70 Q100,50 120,50 L130,50 Q145,50 145,65 L145,80" stroke="#94a3b8" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Ear tips -->
  <circle cx="55" cy="82" r="6" fill="url(#sBody)" stroke="#94a3b8" stroke-width="1"/>
  <circle cx="145" cy="82" r="6" fill="url(#sBody)" stroke="#94a3b8" stroke-width="1"/>
  <!-- LED indicator -->
  <circle cx="100" cy="130" r="4" fill="#3b82f6" opacity="0.7"/>
</svg>
