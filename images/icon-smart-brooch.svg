<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Glass body gradient -->
    <linearGradient id="broochBody" x1="50" y1="30" x2="150" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="40%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- Glass reflection -->
    <linearGradient id="broochGlass" x1="70" y1="40" x2="130" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Blue LED glow -->
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <filter id="broochShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a5f" flood-opacity="0.15"/>
    </filter>
    <!-- LED pulse glow -->
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main brooch body - rounded pill shape -->
  <rect x="45" y="50" width="110" height="100" rx="50" fill="url(#broochBody)" filter="url(#broochShadow)"/>

  <!-- Glass highlight -->
  <ellipse cx="85" cy="80" rx="30" ry="18" fill="url(#broochGlass)"/>

  <!-- Inner bezel ring -->
  <rect x="55" y="60" width="90" height="80" rx="40" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>

  <!-- LED pulse line -->
  <g filter="url(#pulseGlow)">
    <polyline points="60,100 75,100 82,80 90,120 98,85 106,110 114,95 122,100 140,100"
      stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Blue LED dot -->
  <circle cx="100" cy="130" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="100" cy="130" r="10" fill="url(#ledGlow)"/>

  <!-- Top clip/pin -->
  <rect x="92" y="38" width="16" height="18" rx="4" fill="#94a3b8"/>
  <rect x="95" y="35" width="10" height="8" rx="3" fill="#b0bec5"/>
</svg>
