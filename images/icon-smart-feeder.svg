<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Bowl body gradient -->
    <linearGradient id="bowlBody" x1="40" y1="60" x2="160" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="40%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- Bowl inner gradient -->
    <linearGradient id="bowlInner" x1="70" y1="80" x2="130" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <!-- Glass reflection -->
    <linearGradient id="bowlReflection" x1="60" y1="90" x2="90" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Holographic display gradient -->
    <linearGradient id="holoGrad" x1="80" y1="50" x2="120" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="bowlShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a5f" flood-opacity="0.15"/>
    </filter>
    <!-- Holo glow -->
    <filter id="holoGlow">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base shadow ellipse -->
  <ellipse cx="100" cy="160" rx="58" ry="10" fill="#94a3b8" opacity="0.15"/>

  <!-- Bowl outer body -->
  <path d="M40,105 Q40,85 60,80 L140,80 Q160,85 160,105 L155,145 Q155,160 140,160 L60,160 Q45,160 45,145 Z"
    fill="url(#bowlBody)" filter="url(#bowlShadow)"/>

  <!-- Bowl rim -->
  <ellipse cx="100" cy="82" rx="55" ry="14" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <ellipse cx="100" cy="82" rx="55" ry="14" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>

  <!-- Bowl inner -->
  <ellipse cx="100" cy="85" rx="42" ry="10" fill="url(#bowlInner)"/>

  <!-- Glass reflection on bowl -->
  <path d="M55,92 Q60,86 80,88 Q90,90 85,100 Q75,102 60,98 Z" fill="url(#bowlReflection)"/>

  <!-- Medical-grade ring -->
  <ellipse cx="100" cy="82" rx="50" ry="12" fill="none" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- Digital base strip -->
  <rect x="60" y="148" width="80" height="6" rx="3" fill="#1e293b"/>
  <rect x="70" y="149" width="60" height="4" rx="2" fill="#0f172a"/>

  <!-- LED indicators on base -->
  <circle cx="78" cy="151" r="1.5" fill="#3b82f6"/>
  <circle cx="100" cy="151" r="1.5" fill="#3b82f6"/>
  <circle cx="122" cy="151" r="1.5" fill="#3b82f6"/>

  <!-- Holographic weight display floating above -->
  <g filter="url(#holoGlow)">
    <!-- Holo panel -->
    <rect x="68" y="40" width="64" height="28" rx="5" fill="url(#holoGrad)" stroke="#60a5fa" stroke-width="0.5"/>

    <!-- Weight text -->
    <text x="100" y="56" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff" font-weight="bold">125.4g</text>
    <text x="100" y="64" text-anchor="middle" font-family="monospace" font-size="6" fill="#bfdbfe">PRECISE</text>

    <!-- Projection lines -->
    <line x1="80" y1="68" x2="75" y2="78" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
    <line x1="120" y1="68" x2="125" y2="78" stroke="#60a5fa" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>
