<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="camBody" x1="50" y1="40" x2="150" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="40%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="camGlass" x1="80" y1="50" x2="120" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lensInner" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <filter id="camShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e3a5f" flood-opacity="0.15"/>
    </filter>
    <filter id="camGlow">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base shadow -->
  <ellipse cx="100" cy="165" rx="50" ry="8" fill="#94a3b8" opacity="0.15"/>

  <!-- Camera body - rounded cylinder -->
  <rect x="50" y="50" width="100" height="100" rx="22" fill="url(#camBody)" filter="url(#camShadow)"/>

  <!-- Glass highlight -->
  <ellipse cx="88" cy="72" rx="28" ry="14" fill="url(#camGlass)"/>

  <!-- Subtle edge bevel -->
  <rect x="55" y="55" width="90" height="90" rx="18" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.4"/>

  <!-- Lens outer ring -->
  <circle cx="100" cy="100" r="30" fill="#1e293b" opacity="0.15"/>
  <circle cx="100" cy="100" r="28" fill="url(#lensInner)"/>
  <circle cx="100" cy="100" r="28" fill="none" stroke="#475569" stroke-width="1.5" opacity="0.5"/>

  <!-- Lens inner elements -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.6"/>
  <circle cx="100" cy="100" r="13" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.4"/>

  <!-- AI lens glow -->
  <circle cx="100" cy="100" r="16" fill="url(#lensGlow)" filter="url(#camGlow)"/>
  <circle cx="100" cy="100" r="6" fill="#3b82f6" opacity="0.8"/>
  <circle cx="100" cy="100" r="3" fill="#93c5fd" opacity="0.9"/>

  <!-- Lens reflection -->
  <ellipse cx="92" cy="92" rx="8" ry="5" fill="#ffffff" opacity="0.25" transform="rotate(-20 92 92)"/>

  <!-- Status LED -->
  <circle cx="130" cy="62" r="4" fill="#3b82f6" filter="url(#camGlow)" opacity="0.9"/>
  <circle cx="130" cy="62" r="2" fill="#93c5fd"/>

  <!-- AI scan lines (subtle) -->
  <line x1="84" y1="100" x2="116" y2="100" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="84" x2="100" y2="116" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner brackets (AI targeting) -->
  <path d="M82 86 L82 82 L86 82" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <path d="M118 82 L118 86" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <path d="M114 82 L118 82" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <path d="M118 114 L118 118 L114 118" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <path d="M82 118 L86 118" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <path d="M82 114 L82 118" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
</svg>
